<main class="music-list-page">
  @if (loading) {
    <div class="state">Loading...</div>
  } @else if (error) {
    <div class="state error">Could not load tracks. Check your connection.</div>
  } @else {
    @for (track of tracks; track track.id) {
      <music-card [track]="track" />
    }
  }
</main>
