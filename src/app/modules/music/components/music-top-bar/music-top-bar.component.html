<nav>
  <ul>
    @for (tab of tabs; track tab.path) {
      <li
        [routerLink]="['/music', tab.path]"
        [routerLinkActive]="['active']"
      >
        <fa-icon [icon]="['fas', tab.icon]" />
        <span class="label">{{ i18n.translate(tab.labelKey) }}</span>
      </li>
    }
  </ul>
</nav>
