<main>
  <!-- Map -->
  <section class="map-container container">
    <img id="map" src="assets/img/mapboxMocked.png" alt="map">
  </section>

  <!-- navigation -->
  <section class="navigation-container container g-glassmorphism">
    <div class="nav-content">
      <article>
        <fa-icon [icon]="['fas','bed']"/>
        <p>MEININGER Hotel</p>
        <span>Amsterdam Cen...</span>
      </article>

      <article>
        <fa-icon [icon]="['fas','bed']"/>
        <p>MEININGER Hotel</p>
        <span>Amsterdam Cen...</span>
      </article>
    </div>
  </section>

  <!-- Music -->
  <section class="music-container container g-glassmorphism">
    @if (media) {
      <div class="music-content">
        <div class="album-art">
          <img [src]="media.artworkLarge" [alt]="media.title">
        </div>
        <div class="song-info">
          <h3>{{ media.title }}</h3>
          <p>{{ media.subtitle }}</p>
        </div>

        <div class="controls">
          <fa-icon [icon]="['fas','step-backward']"/>
          <fa-icon
            [icon]="['fas', isPlaying ? 'pause' : 'play']"
            (click)="togglePlay()"
          />
          <fa-icon [icon]="['fas','step-forward']"/>
        </div>

        <div
          #progressBar
          class="progress-bar"
          (pointerdown)="onScrubStart($event)"
          [class.is-dragging]="isDragging"
        >
          <div class="progress" [style.width.%]="progressPercent()">
            <span class="handle"></span>
          </div>
        </div>
      </div>
    } @else {
      <button type="button" class="music-placeholder" (click)="goToMusic()">
        <fa-icon [icon]="['fas','music']" />
        <span class="placeholder-title">Pulsa para acceder a música</span>
        <span class="placeholder-hint">Elige una canción para empezar</span>
      </button>
    }
  </section>
</main>
