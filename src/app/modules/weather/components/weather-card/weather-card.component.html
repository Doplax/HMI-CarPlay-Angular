<div class="day-row">
  <div class="day-label">{{ entry.date | date:'EEE' }}</div>
  <div class="day-icon">{{ icon }}</div>
  <div class="day-min">{{ display(entry.tmin) | number:'1.0-0' }}°</div>
  <div class="day-range">
    <div class="range-bar">
      <div
        class="range-fill"
        [style.left.%]="rangeOffset"
        [style.width.%]="rangeWidth"
      ></div>
    </div>
  </div>
  <div class="day-max">{{ display(entry.tmax) | number:'1.0-0' }}°</div>
</div>
